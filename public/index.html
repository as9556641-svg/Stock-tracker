<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Portfolio Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Stock Portfolio Tracker</p>
        <h1>Track your portfolio in one clean workspace.</h1>
        <p class="hero-copy">
          Sign up, log in, and manage stock positions with a lightweight full stack app.
        </p>
      </section>

      <section class="panel">
        <div class="auth-section" id="auth-section">
          <div class="tabs">
            <button class="tab active" data-tab="login">Login</button>
            <button class="tab" data-tab="signup">Sign Up</button>
          </div>

          <form id="login-form" class="card">
            <h2>Welcome back</h2>
            <label>
              Email
              <input type="email" id="login-email" placeholder="you@example.com" required />
            </label>
            <label>
              Password
              <input type="password" id="login-password" placeholder="Enter password" required />
            </label>
            <button type="submit" class="primary-btn">Login</button>
          </form>

          <form id="signup-form" class="card hidden">
            <h2>Create account</h2>
            <label>
              Name
              <input type="text" id="signup-name" placeholder="Jane Doe" required />
            </label>
            <label>
              Email
              <input type="email" id="signup-email" placeholder="you@example.com" required />
            </label>
            <label>
              Password
              <input type="password" id="signup-password" placeholder="Create password" required />
            </label>
            <button type="submit" class="primary-btn">Sign Up</button>
          </form>
        </div>

        <div class="dashboard hidden" id="dashboard">
          <div class="dashboard-header">
            <div>
              <p class="eyebrow">Your collection</p>
              <h2 id="welcome-text">Portfolio</h2>
            </div>
            <button id="logout-btn" class="secondary-btn">Logout</button>
          </div>

          <form id="stock-form" class="card stock-form">
            <h3>Add stock</h3>
            <label>
              Company Name
              <input type="text" id="stock-name" placeholder="Apple Inc." required />
            </label>
            <label>
              Symbol
              <input type="text" id="stock-symbol" placeholder="AAPL" required />
            </label>
            <label>
              Quantity
              <input type="number" id="stock-quantity" min="1" placeholder="10" required />
            </label>
            <label>
              Current Price
              <input type="number" id="stock-price" min="0" step="0.01" placeholder="190.50" required />
            </label>
            <label>
              Average Buy Price
              <input type="number" id="stock-average-cost" min="0" step="0.01" placeholder="160.00" required />
            </label>
            <button type="submit" class="primary-btn">Add Stock</button>
          </form>

          <section class="stock-list-wrap">
            <div class="list-header">
              <h3>Your stocks</h3>
              <span id="stock-count">0 stocks</span>
            </div>
            <div id="stock-list" class="stock-list"></div>
          </section>
        </div>

        <p id="message" class="message"></p>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
